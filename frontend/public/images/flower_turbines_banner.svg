<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad_Flower_Turbines" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" rx="16" fill="url(#grad_Flower_Turbines)" />

  <!-- Decorative Abstract Circles -->
  <circle cx="750" cy="80" r="160" fill="#ffffff" opacity="0.04" />
  <circle cx="50" cy="280" r="120" fill="#ffffff" opacity="0.03" />
  <path d="M-50 160 C100 80 200 240 350 160 C500 80 650 240 850 160" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.04" />

  <!-- Category Badge -->
  <g transform="translate(60, 65)">
    <rect width="260" height="28" rx="14" fill="#ffffff" opacity="0.12" />
    <text x="12" y="18" fill="#ffffff" font-family="'Outfit', 'Inter', sans-serif" font-size="11" font-weight="700" letter-spacing="1" opacity="0.95">CLEAN ENERGY / WIND</text>
  </g>

  <!-- Branding Text -->
  <text x="60" y="160" fill="#ffffff" font-family="'Outfit', 'Inter', sans-serif" font-size="52" font-weight="900" letter-spacing="-1.5" filter="url(#glow)">Flower Turbines</text>
  <text x="60" y="215" fill="#ffffff" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="500" opacity="0.85">Beautiful and quiet vertical-axis wind turbines.</text>

  <!-- Stylized Icon Container -->
  <g transform="translate(640, 90) scale(1.4)">
    <circle cx="45" cy="65" r="40" fill="#ffffff" opacity="0.08" />
    
      <!-- Tulip Wind Turbine / Flower Blades -->
      <g fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M45 90 V25" stroke="#38bdf8" stroke-width="4" />
        <!-- Blades resembling a tulip flower -->
        <path d="M45 35 C30 45 30 75 45 85 C60 75 60 45 45 35 Z" fill="#38bdf8" opacity="0.2" stroke="#38bdf8" stroke-width="3" />
        <path d="M45 35 C38 45 38 65 45 75" stroke="#38bdf8" stroke-width="2" />
        <path d="M45 35 C52 45 52 65 45 75" stroke="#38bdf8" stroke-width="2" />
      </g>
    
  </g>
</svg>
