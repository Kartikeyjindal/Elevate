<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad_Greenfield_Robotics" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1917;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#78716c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" rx="16" fill="url(#grad_Greenfield_Robotics)" />

  <!-- Decorative Abstract Circles -->
  <circle cx="750" cy="80" r="160" fill="#ffffff" opacity="0.04" />
  <circle cx="50" cy="280" r="120" fill="#ffffff" opacity="0.03" />
  <path d="M-50 160 C100 80 200 240 350 160 C500 80 650 240 850 160" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.04" />

  <!-- Category Badge -->
  <g transform="translate(60, 65)">
    <rect width="260" height="28" rx="14" fill="#ffffff" opacity="0.12" />
    <text x="12" y="18" fill="#ffffff" font-family="'Outfit', 'Inter', sans-serif" font-size="11" font-weight="700" letter-spacing="1" opacity="0.95">AGRICULTURE / AGRITECH ROBOTICS</text>
  </g>

  <!-- Branding Text -->
  <text x="60" y="160" fill="#ffffff" font-family="'Outfit', 'Inter', sans-serif" font-size="52" font-weight="900" letter-spacing="-1.5" filter="url(#glow)">Greenfield Robotics</text>
  <text x="60" y="215" fill="#ffffff" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="500" opacity="0.85">Autonomous weeding robots eliminating herbicides.</text>

  <!-- Stylized Icon Container -->
  <g transform="translate(640, 90) scale(1.4)">
    <circle cx="45" cy="65" r="40" fill="#ffffff" opacity="0.08" />
    
      <!-- Robot Tractor and Plant leaf -->
      <g fill="none" stroke-linecap="round" stroke-linejoin="round">
        <!-- Robot chassis -->
        <rect x="20" y="60" width="50" height="30" rx="5" stroke="#a8a29e" stroke-width="4" fill="#a8a29e" opacity="0.2" />
        <!-- Wheels -->
        <circle cx="32" cy="95" r="10" stroke="#a8a29e" stroke-width="4" />
        <circle cx="58" cy="95" r="10" stroke="#a8a29e" stroke-width="4" />
        <!-- Leaf sprouting -->
        <path d="M45 40 C55 40 60 50 45 60 C35 50 40 40 45 40 Z" fill="#86efac" />
        <path d="M45 50 v10" stroke="#86efac" stroke-width="2" />
      </g>
    
  </g>
</svg>
