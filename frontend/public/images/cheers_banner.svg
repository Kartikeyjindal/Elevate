<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad_Cheers_Health" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" rx="16" fill="url(#grad_Cheers_Health)" />

  <!-- Decorative Abstract Circles -->
  <circle cx="750" cy="80" r="160" fill="#ffffff" opacity="0.04" />
  <circle cx="50" cy="280" r="120" fill="#ffffff" opacity="0.03" />
  <path d="M-50 160 C100 80 200 240 350 160 C500 80 650 240 850 160" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.04" />

  <!-- Category Badge -->
  <g transform="translate(60, 65)">
    <rect width="260" height="28" rx="14" fill="#ffffff" opacity="0.12" />
    <text x="12" y="18" fill="#ffffff" font-family="'Outfit', 'Inter', sans-serif" font-size="11" font-weight="700" letter-spacing="1" opacity="0.95">HEALTH &amp; WELLNESS / CPG</text>
  </g>

  <!-- Branding Text -->
  <text x="60" y="160" fill="#ffffff" font-family="'Outfit', 'Inter', sans-serif" font-size="52" font-weight="900" letter-spacing="-1.5" filter="url(#glow)">Cheers Health</text>
  <text x="60" y="215" fill="#ffffff" font-family="'Outfit', 'Inter', sans-serif" font-size="20" font-weight="500" opacity="0.85">Science-backed supplements for liver &amp; gut.</text>

  <!-- Stylized Icon Container -->
  <g transform="translate(640, 90) scale(1.4)">
    <circle cx="45" cy="65" r="40" fill="#ffffff" opacity="0.08" />
    
      <!-- Shield and Healing Cross -->
      <g fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M45 40 C65 40 75 48 75 65 C75 90 55 105 45 110 C35 105 15 90 15 65 C15 48 25 40 45 40 Z" fill="#34d399" opacity="0.2" stroke="#34d399" stroke-width="4" />
        <path d="M45 55 v20 M35 65 h20" stroke="#34d399" stroke-width="6" />
      </g>
    
  </g>
</svg>
